name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name LuzidSettings --hidden-import customtkinter --hidden-import PIL debug.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuzidSettings-exe
          path: dist/LuzidSettings.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LuzidSettings.exe
          body: |
            ## LuzidSettings ${{ github.ref_name }}

            ### ⬇️ Download
            Download `LuzidSettings.exe` and run as **Administrator**.

            No Python needed. No installer. Just run.

            ---

            ### What's included
            - 67 one-click Windows tweaks (General, Privacy, Windows 11)
            - Live CPU/RAM monitoring with graphs
            - Benchmark engine
            - Startup manager
            - Process scanner
            - Network analyzer
            - System restore point manager
            - FPS overlay
            - Auto game detection with profile switching

            ---

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
